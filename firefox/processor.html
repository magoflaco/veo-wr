<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Veo WR · Procesando…</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --yellow: #e8ff47;
      --green: #47ffaa;
      --red: #ff6060;
      --bg: #080808;
      --bg2: #111;
      --border: #1e1e1e;
      --muted: #444;
      --text: #ccc;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── scanline overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, .07) 2px,
          rgba(0, 0, 0, .07) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      padding: 40px 24px;
    }

    /* ── spinning ring ── */
    .ring-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 36px;
    }

    .ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--yellow);
      animation: spin 1.1s linear infinite;
      position: absolute;
      inset: 0;
    }

    .ring-inner {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid var(--border);
      border-bottom-color: var(--yellow);
      opacity: .5;
      animation: spin 1.7s linear infinite reverse;
      position: absolute;
      top: 11px;
      left: 11px;
    }

    .ring-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      line-height: 1;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── title ── */
    .title {
      font-size: 11px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 8px;
      text-align: center;
    }

    .filename {
      font-size: 13px;
      color: var(--text);
      letter-spacing: .03em;
      max-width: 420px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 32px;
    }

    .filename.placeholder {
      color: var(--muted);
      font-style: italic;
    }

    /* ── progress bar ── */
    .bar-wrap {
      width: 360px;
      max-width: 100%;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 7px;
    }

    .bar-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .bar-pct {
      font-size: 14px;
      font-weight: 500;
      color: var(--yellow);
      letter-spacing: .04em;
      min-width: 40px;
      text-align: right;
    }

    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      background: var(--yellow);
      border-radius: 2px;
      width: 0%;
      transition: width .35s cubic-bezier(.4, 0, .2, 1);
      position: relative;
    }

    /* shimmer on bar-fill */
    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -60%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
      animation: shimmer 1.8s linear infinite;
    }

    @keyframes shimmer {
      to {
        left: 160%;
      }
    }

    .bar-step {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .08em;
      margin-top: 8px;
      min-height: 14px;
      text-align: right;
      transition: color .2s;
    }

    /* ── warning ── */
    .warning {
      margin-top: 40px;
      border: 1px solid #2a2200;
      background: #0f0b00;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 10px;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #b89a00;
      display: flex;
      align-items: center;
      gap: 9px;
      width: 360px;
      max-width: 100%;
    }

    .warning-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    /* ── done / error states ── */
    .ring.done {
      border-top-color: var(--green);
      animation: none;
    }

    .ring-inner.done {
      border-bottom-color: var(--green);
      animation: none;
    }

    .bar-fill.done {
      background: var(--green);
    }

    .bar-fill.done::after {
      display: none;
    }

    .ring.error {
      border-top-color: var(--red);
      animation: none;
    }

    .ring-inner.error {
      border-bottom-color: var(--red);
      animation: none;
    }

    .bar-fill.error {
      background: var(--red);
    }

    .bar-fill.error::after {
      display: none;
    }

    .bar-pct.done {
      color: var(--green);
    }

    .bar-pct.error {
      color: var(--red);
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="ring-wrap">
      <div class="ring" id="ring"></div>
      <div class="ring-inner" id="ringInner"></div>
      <div class="ring-icon">🎬</div>
    </div>

    <div class="title" data-i18n="proc_title">Veo Watermark Remover</div>
    <div class="filename placeholder" id="filenameEl" data-i18n="proc_loading">Cargando video…</div>

    <div class="bar-wrap">
      <div class="bar-meta">
        <span class="bar-label" id="barLabel" data-i18n="proc_starting">Iniciando</span>
        <span class="bar-pct" id="barPct">0%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <div class="bar-step" id="barStep">&nbsp;</div>
    </div>

    <div class="warning">
      <span class="warning-icon">⚠</span>
      <span data-i18n="proc_warning">No cierres esta pestaña mientras se procesa el video</span>
    </div>

  </div>

  <script src="ffmpeg.min.js"></script>
  <script src="util.min.js"></script>
  <script src="i18n.js"></script>
  <script src="processor.js"></script>
</body>

</html>
