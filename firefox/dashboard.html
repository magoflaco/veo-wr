<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Veo WR — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --s: #111;
            --b: #222;
            --a: #e8ff47;
            --t: #e0e0e0;
            --d: #555;
            --ok: #47ffaa;
            --err: #ff6060;
        }

        body {
            background: var(--bg);
            color: var(--t);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: .08em;
            color: var(--a);
            line-height: 1;
            margin-bottom: 6px;
        }

        .sub {
            color: var(--d);
            font-size: .72rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        #downloadsContainer {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--s);
            border: 1px solid var(--b);
            border-radius: 6px;
            padding: 24px 28px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: border-color 0.3s ease;
        }

        .card:hover {
            border-color: #333;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filename {
            font-size: 1rem;
            font-weight: 500;
            color: var(--t);
            word-break: break-all;
            letter-spacing: 0.02em;
        }

        .status-badge {
            font-size: 0.7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;
            background: #222;
            color: var(--d);
            font-weight: 500;
        }

        .status-badge.processing {
            background: rgba(232, 255, 71, 0.1);
            color: var(--a);
            border: 1px solid rgba(232, 255, 71, 0.2);
        }

        .status-badge.done {
            background: rgba(71, 255, 170, 0.1);
            color: var(--ok);
            border: 1px solid rgba(71, 255, 170, 0.2);
        }

        .status-badge.error {
            background: rgba(255, 96, 96, 0.1);
            color: var(--err);
            border: 1px solid rgba(255, 96, 96, 0.2);
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-bg {
            height: 6px;
            background: var(--b);
            border-radius: 3px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--a);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .status-message {
            font-size: 0.85rem;
            color: var(--d);
        }

        .status-message.processing {
            color: var(--a);
        }

        .status-message.done {
            color: var(--ok);
        }

        .status-message.error {
            color: var(--err);
        }

        #emptyState {
            text-align: center;
            padding: 60px 20px;
            color: var(--d);
            background: var(--s);
            border: 1px dashed var(--b);
            border-radius: 6px;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        .nav-links {
            margin-top: 40px;
            display: flex;
            gap: 24px;
        }

        .nav-link {
            font-size: 0.75rem;
            color: var(--d);
            text-decoration: none;
            letter-spacing: .15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            color: var(--a);
        }

        .nav-link svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
    </style>
</head>

<body>
    <h1 data-i18n="dash_title">Veo WR</h1>
    <p class="sub" data-i18n="dash_subtitle">Dashboard · Descargas Activas</p>

    <div id="downloadsContainer">
        <!-- Tarjetas dinámicas se insertan aquí -->
        <div id="emptyState" style="display: none;" data-i18n="dash_empty">
            No hay videos procesándose en este momento.
        </div>
    </div>

    <div class="nav-links">
        <a class="nav-link" id="optionsLink">
            <svg viewBox="0 0 24 24">

        </a>
    </div>

    <script src="i18n.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
