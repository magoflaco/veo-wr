<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Veo Watermark Remover</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      user-select: none;
    }

    .header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 14px 16px 12px;
    }

    .logo {
      font-size: 15px;
      font-weight: 500;
      color: #e8ff47;
      letter-spacing: .04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-sub {
      font-size: 9px;
      color: #555;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .status-row {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .status-label {
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 6px;
    }

    .status-text {
      color: #e8ff47;
      font-size: 11px;
    }

    .status-text.idle {
      color: #47ffaa;
    }

    .status-text.processing {
      color: #e8ff47;
    }

    .status-text.error {
      color: #ff6060;
    }

    .progress-bar {
      height: 3px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #e8ff47;
      width: 0%;
      transition: width .2s;
      border-radius: 2px;
    }

    .toggle-row {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }

    .toggle-label {
      font-size: 10px;
      color: #888;
      letter-spacing: .05em;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input {
      display: none;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 10px;
      transition: .2s;
    }

    .toggle input:checked+.toggle-track {
      background: #e8ff47;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #888;
      transition: .2s;
    }

    .toggle input:checked~.toggle-thumb {
      left: 19px;
      background: #000;
    }

    .footer {
      padding: 10px 16px;
    }

    .downloads-list {
      display: flex;
      flex-direction: column;
    }

    .options-link {
      font-size: 10px;
      color: #444;
      text-decoration: none;
      letter-spacing: .08em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .15s;
    }

    .options-link:hover {
      color: #e8ff47;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">🎬 Veo WR</div>
    <div class="logo-sub" data-i18n="popup_subtitle">Watermark Remover</div>
  </div>

  <div id="downloadsContainer" class="downloads-list">
    <!-- Dynamic items go here -->
    <div class="status-row" id="emptyState">
      <div class="status-label" data-i18n="popup_status_label">Estado</div>
      <div class="status-text idle" data-i18n="dash_empty">Listo</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label" data-i18n="opt_auto_label">Auto-procesar descargas</span>
    <label class="toggle">
      <input type="checkbox" id="autoToggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="footer">
    <a class="options-link" id="optionsLink">⚙ <span data-i18n="dash_settings">Configuración</span></a>
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>

</html>
